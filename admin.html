<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTU Admin - Dark Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #0b0f1a; color: #e2e8f0; overflow-x: hidden; }
        .sidebar { background: #111827; width: 280px; height: 100vh; position: fixed; right: 0; top: 0; border-left: 1px solid #1f2937; }
        .nav-link { color: #94a3b8; transition: 0.2s; cursor: pointer; border-radius: 12px; display: flex; align-items: center; gap: 1rem; padding: 1rem; font-weight: bold; }
        .nav-link:hover, .nav-link.active { background: #3b82f6; color: white; box-shadow: 0 4px 20px -5px rgba(59, 130, 246, 0.5); }
        .stat-card { background: #1f2937; border-radius: 24px; padding: 24px; border: 1px solid #374151; transition: 0.3s; }
        .glass-box { background: #111827; border-radius: 2.5rem; border: 1px solid #1f2937; }
        .hidden { display: none !important; }
        .main-content { margin-right: 280px; padding: 2rem; width: calc(100% - 280px); }
    </style>
</head>
<body class="flex">

    <div id="auth-screen" class="fixed inset-0 z-[200] bg-[#0b0f1a] flex items-center justify-center p-4">
        <div class="bg-[#111827] p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md text-center border border-gray-800">
            <div class="w-20 h-20 bg-blue-600 text-white rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
                <i class="fas fa-shield-halved text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 text-white">دخول الإدارة</h2>
            <input type="password" id="admin-pass" placeholder="Password" class="w-full p-4 bg-[#0b0f1a] border border-gray-800 rounded-2xl mb-4 text-center text-xl tracking-[0.5em] text-blue-400 outline-none focus:border-blue-500 transition-all">
            <button id="btn-login" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 transition-all">دخول النظام</button>
        </div>
    </div>

    <div id="admin-system" class="hidden flex w-full">
        <aside class="sidebar p-6">
            <div class="mb-10 text-center border-b border-gray-800 pb-6">
                <h1 class="text-2xl font-black italic text-white">BTU <span class="text-blue-500">ADMIN</span></h1>
            </div>
            <nav class="space-y-1">
                <div onclick="showTab('students')" id="link-students" class="nav-link active"><i class="fas fa-users"></i> شؤون الطلاب</div>
                <div onclick="showTab('grades')" id="link-grades" class="nav-link"><i class="fas fa-file-invoice"></i> رفع الدرجات</div>
                <div onclick="showTab('certificates')" id="link-certificates" class="nav-link"><i class="fas fa-certificate"></i> إدارة الشهادات</div>
                <div onclick="showTab('military')" id="link-military" class="nav-link"><i class="fas fa-shield-alt"></i> التربية العسكرية</div>
            </nav>
            <div class="absolute bottom-8 left-6 right-6 border-t border-gray-800 pt-6">
                <div onclick="location.reload()" class="nav-link text-red-500 hover:bg-red-500/10"><i class="fas fa-power-off"></i> تسجيل الخروج</div>
            </div>
        </aside>

        <main class="main-content">
            <header class="flex justify-between items-center mb-10">
                <div><h2 id="tab-title" class="text-3xl font-black text-white italic">شؤون الطلاب</h2><p class="text-gray-500 font-bold italic">Management Portal</p></div>
                <input type="file" id="main-excel" class="hidden" onchange="handleExcel(this, 'students')">
                <button id="main-upload-btn" onclick="document.getElementById('main-excel').click()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black text-sm flex items-center gap-3 hover:bg-blue-500 shadow-xl transition-all">
                    <i class="fas fa-file-excel text-lg"></i> استيراد شيت الطلاب
                </button>
            </header>

            <div id="content-box" class="glass-box p-8 min-h-[500px]">
                <div id="view-students">
                    <table class="w-full text-right">
                        <thead><tr class="text-gray-500 text-[10px] font-black uppercase border-b border-gray-800"><th class="pb-6">الاسم</th><th class="pb-6 text-center">الكود</th><th class="pb-6">القسم</th><th class="pb-6 text-center">الإجراءات</th></tr></thead>
                        <tbody id="rows-output" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>

                <div id="view-upload-center" class="hidden flex flex-col items-center justify-center py-24">
                    <div class="w-24 h-24 bg-blue-500/10 rounded-full flex items-center justify-center mb-6">
                        <i id="center-icon" class="fas fa-upload text-4xl text-blue-500"></i>
                    </div>
                    <h3 id="center-title" class="text-2xl font-black mb-2"></h3>
                    <p id="center-desc" class="text-gray-500 mb-8 font-bold italic">قم برفع ملف الإكسيل الخاص بهذا القسم لتحديث بيانات السحابة</p>
                    <button id="center-btn" class="bg-blue-600 px-12 py-5 rounded-2xl font-black shadow-lg hover:scale-105 transition-all"></button>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY", authDomain: "btu-portal.firebaseapp.com", databaseURL: "https://btu-portal-default-rtdb.firebaseio.com", projectId: "btu-portal" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('btn-login').onclick = () => {
            if(document.getElementById('admin-pass').value === "29112006") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('admin-system').classList.remove('hidden');
            } else { alert("خطأ!"); }
        };

        window.showTab = (tab) => {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById('link-' + tab).classList.add('active');
            
            const vStudents = document.getElementById('view-students');
            const vUpload = document.getElementById('view-upload-center');
            const mainBtn = document.getElementById('main-upload-btn');
            
            if(tab === 'students') {
                vStudents.classList.remove('hidden'); vUpload.classList.add('hidden');
                mainBtn.classList.remove('hidden');
                document.getElementById('tab-title').innerText = "شؤون الطلاب";
            } else {
                vStudents.classList.add('hidden'); vUpload.classList.remove('hidden');
                mainBtn.classList.add('hidden');
                const config = {
                    grades: { title: "رفع الدرجات", btn: "رفع شيت الدرجات", icon: "fa-file-invoice" },
                    certificates: { title: "إدارة الشهادات", btn: "رفع شيت الشهادات", icon: "fa-certificate" },
                    military: { title: "التربية العسكرية", btn: "رفع شيت التربية العسكرية", icon: "fa-shield-alt" }
                };
                document.getElementById('tab-title').innerText = config[tab].title;
                document.getElementById('center-title').innerText = config[tab].title;
                document.getElementById('center-btn').innerText = config[tab].btn;
                document.getElementById('center-icon').className = `fas ${config[tab].icon} text-4xl text-blue-500`;
                document.getElementById('center-btn').onclick = () => document.getElementById('main-excel').click();
            }
        };

        window.handleExcel = (input, type) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const up = {};
                json.forEach(row => { if(row['University ID']) up[row['University ID']] = row; });
                update(ref(db, 'students'), up).then(() => alert("تم التحديث بنجاح!"));
            };
            reader.readAsArrayBuffer(input.files[0]);
        };

        onValue(ref(db, 'students'), (snap) => {
            const out = document.getElementById('rows-output');
            out.innerHTML = '';
            if(snap.exists()) {
                Object.values(snap.val()).forEach(s => {
                    out.innerHTML += `<tr class="hover:bg-gray-800/50 cursor-pointer border-b border-gray-800">
                        <td class="py-6 font-black text-white">${s.Name}</td>
                        <td class="py-6 text-center font-mono text-blue-400 font-bold italic">${s['University ID']}</td>
                        <td class="py-6 font-bold text-gray-500">${s.Department}</td>
                        <td class="py-6 text-center"><i class="fas fa-cog text-gray-700"></i></td></tr>`;
                });
            }
        });
    </script>
</body>
</html>
