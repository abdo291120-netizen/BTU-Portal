<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTU Admin - Cloud Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-slate-700 pb-6">
            <h1 class="text-3xl font-black italic text-blue-500">BTU ADMIN <span class="text-white">PORTAL</span></h1>
            <div id="status" class="px-4 py-2 rounded-full bg-red-500/10 text-red-500 border border-red-500/20 text-xs font-bold">Disconnected</div>
        </div>

        <div class="bg-slate-800 rounded-2xl p-12 border border-slate-700 text-center mb-8 shadow-2xl">
            <input type="file" id="upload" class="hidden" accept=".xlsx, .xls">
            <div onclick="document.getElementById('upload').click()" class="cursor-pointer border-2 border-dashed border-slate-600 rounded-xl p-10 hover:border-blue-500 transition-all">
                <i class="fas fa-file-csv text-5xl text-blue-400 mb-4"></i>
                <h2 class="text-xl font-bold">ارفع ملف الطلاب (Excel)</h2>
                <p class="text-slate-400 mt-2 text-sm">تأكد أن الملف يحتوي على أعمدة: Name, University ID</p>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
            <div class="p-4 bg-slate-900/50 font-bold border-b border-slate-700 flex justify-between">
                <span>معاينة البيانات السحابية</span>
                <span id="count" class="text-blue-400">0 طالب</span>
            </div>
            <table class="w-full text-right" dir="rtl">
                <thead class="text-xs text-slate-500 uppercase bg-slate-900">
                    <tr>
                        <th class="p-4">الاسم</th>
                        <th class="p-4">الكود الجامعي</th>
                        <th class="p-4">السنة</th>
                        <th class="p-4">الحالة</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-700"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY",
            authDomain: "btu-portal.firebaseapp.com",
            databaseURL: "https://btu-portal-default-rtdb.firebaseio.com",
            projectId: "btu-portal",
            storageBucket: "btu-portal.firebasestorage.app",
            messagingSenderId: "89595921223",
            appId: "1:89595921223:web:6f2039fb0dfeac1c08c262"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, '.info/connected'), (s) => {
            const st = document.getElementById('status');
            if(s.val()){ st.innerText="Cloud Online"; st.className="px-4 py-2 rounded-full bg-green-500/10 text-green-500 border border-green-500/20 text-xs font-bold"; }
        });

        document.getElementById('upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                const data = new Uint8Array(f.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const list = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                const cloud = {};
                list.forEach(s => {
                    const id = String(s['University ID']).trim();
                    cloud[id] = {
                        name: s['Name'],
                        id: id,
                        dept: s['Department'] || 'Marketing',
                        year: s['Year'] || 'N/A',
                        phone: s['Phone'] || 'N/A'
                    };
                });

                set(ref(db, 'students'), cloud).then(() => alert("تم الرفع للسحابة بنجاح!"));
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        onValue(ref(db, 'students'), (snap) => {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(snap.exists()){
                const data = Object.values(snap.val());
                document.getElementById('count').innerText = data.length + " طالب";
                data.forEach(s => {
                    tbody.innerHTML += `<tr class="hover:bg-slate-700/30">
                        <td class="p-4 font-bold">${s.name}</td>
                        <td class="p-4 text-slate-400">${s.id}</td>
                        <td class="p-4 text-blue-400">${s.year}</td>
                        <td class="p-4"><span class="text-green-500 text-[10px] font-bold">ONLINE</span></td>
                    </tr>`;
                });
            }
        });
    </script>
</body>
</html>
