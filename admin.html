<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSUT - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#111827] min-h-screen p-8 text-white">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-700 pb-6">
            <div>
                <h1 class="text-4xl font-bold text-white">BTU Admin</h1>
                <p class="text-blue-400 font-medium">Cloud Database Manager</p>
            </div>
            <div id="connection-status" class="bg-red-500/20 text-red-400 px-4 py-2 rounded-full text-xs font-bold border border-red-500/50">
                Disconnected
            </div>
        </div>

        <div class="bg-gray-800 rounded-2xl p-10 mb-8 border border-gray-700 text-center shadow-2xl">
            <input type="file" id="excel-input" class="hidden" accept=".xlsx, .xls">
            <div onclick="document.getElementById('excel-input').click()" class="border-2 border-dashed border-gray-600 rounded-xl p-16 hover:border-blue-500 transition-all cursor-pointer bg-gray-900/50">
                <i class="fas fa-cloud-upload-alt text-6xl text-blue-500 mb-6"></i>
                <h3 class="text-2xl font-bold mb-2">Upload Student Records</h3>
                <p class="text-gray-400 mb-6">Click to select your Excel file (.xlsx)</p>
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-3 rounded-lg font-bold transition-all">Select File</button>
            </div>
        </div>

        <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-gray-700 flex justify-between items-center bg-gray-900/50">
                <h3 class="font-bold text-xl">Cloud Preview</h3>
                <span id="record-count" class="bg-blue-600 px-3 py-1 rounded-full text-xs">0 Students Found</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-900 text-gray-400 text-xs uppercase">
                        <tr>
                            <th class="p-5">Student Name</th>
                            <th class="p-5">University ID</th>
                            <th class="p-5">Department</th>
                            <th class="p-5">Status</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body" class="divide-y divide-gray-700">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY",
            authDomain: "btu-portal.firebaseapp.com",
            databaseURL: "https://btu-portal-default-rtdb.firebaseio.com",
            projectId: "btu-portal",
            storageBucket: "btu-portal.firebasestorage.app",
            messagingSenderId: "89595921223",
            appId: "1:89595921223:web:6f2039fb0dfeac1c08c262"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // تحديث الحالة عند الاتصال
        const statusDiv = document.getElementById('connection-status');
        onValue(ref(db, '.info/connected'), (snap) => {
            if (snap.val() === true) {
                statusDiv.innerText = "Cloud Connected";
                statusDiv.className = "bg-green-500/20 text-green-400 px-4 py-2 rounded-full text-xs font-bold border border-green-500/50";
            }
        });

        // قراءة الملف ورفعه
        document.getElementById('excel-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const students = XLSX.utils.sheet_to_json(sheet);
                
                const cloudData = {};
                students.forEach(s => {
                    const id = String(s.ID || s.id);
                    cloudData[id] = {
                        name: s.Name || s.name,
                        id: id,
                        dept: s.Department || s.dept || "Marketing",
                        gpa: s.GPA || s.gpa || "0.00"
                    };
                });

                set(ref(db, 'students'), cloudData)
                    .then(() => alert("تم الحفظ في السحابة بنجاح!"))
                    .catch(() => alert("خطأ في الحفظ، تأكد من إعدادات Firebase"));
            };
            reader.readAsArrayBuffer(file);
        });

        // عرض البيانات من السحابة مباشرة (عشان ما تتمسحش في الريفرش)
        onValue(ref(db, 'students'), (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('student-table-body');
            tbody.innerHTML = '';
            if(data) {
                const list = Object.values(data);
                document.getElementById('record-count').innerText = `${list.length} Students Online`;
                list.forEach(s => {
                    tbody.innerHTML += `<tr class="hover:bg-gray-700/50 transition-all">
                        <td class="p-5 font-bold">${s.name}</td>
                        <td class="p-5 text-gray-400">${s.id}</td>
                        <td class="p-5 text-blue-400">${s.dept}</td>
                        <td class="p-5"><span class="bg-green-500/20 text-green-400 px-2 py-1 rounded text-[10px]">ONLINE</span></td>
                    </tr>`;
                });
            }
        });
    </script>
</body>
</html>
