<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - BTU Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-item { transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-radius: 12px; color: #94a3b8; }
        .sidebar-item.active { background: #2563eb; color: white; }
        #lock-screen { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="lock-screen">
        <div class="w-full max-w-sm p-6 text-center">
            <h2 class="text-2xl font-bold mb-4">Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Password" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-center mb-4">
            <button onclick="verifyAccess()" class="w-full bg-blue-600 p-3 rounded-lg font-bold">Verify</button>
        </div>
    </div>

    <aside class="w-64 bg-[#0f172a] text-white flex flex-col p-4 fixed h-full shadow-xl">
        <div class="flex items-center gap-2 mb-10 p-2 font-bold text-xl italic text-blue-400">
            <i class="fas fa-university"></i> BTU ADMIN
        </div>
        <nav class="space-y-2">
            <div onclick="switchTab('overview', this)" class="sidebar-item active"><i class="fas fa-home"></i> Overview</div>
            <div onclick="switchTab('students', this)" class="sidebar-item"><i class="fas fa-user-graduate"></i> Students List</div>
            <div onclick="switchTab('upload', this)" class="sidebar-item"><i class="fas fa-upload"></i> Import Excel</div>
        </nav>
    </aside>

    <main class="flex-1 ml-64 p-8">
        <div id="content-area"></div>
    </main>

    <script>
        function verifyAccess() {
            if (document.getElementById('admin-pass').value === "29112006") {
                document.getElementById('lock-screen').style.display = 'none';
            }
        }

        // قاعدة البيانات (دعم الحقول الجديدة)
        let studentDb = JSON.parse(localStorage.getItem('BTU_PORTAL_DB')) || [];

        function saveDb() {
            localStorage.setItem('BTU_PORTAL_DB', JSON.stringify(studentDb));
            if(document.getElementById('student-table')) renderStudents();
        }

        // حذف طالب
        function deleteStudent(index) {
            if(confirm("Are you sure you want to delete this student?")) {
                studentDb.splice(index, 1);
                saveDb();
                switchTab('students', document.querySelectorAll('.sidebar-item')[1]);
            }
        }

        // رفع الإكسيل ومعالجة البيانات
        function handleUpload(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const data = XLSX.utils.sheet_to_json(sheet);

                data.forEach(row => {
                    studentDb.push({
                        name: row.Name || row.name || "N/A",
                        id: String(row.ID || row.id || ""),
                        phone: row.Phone || row.phone || "N/A",
                        level: row.Level || row.level || "N/A",
                        dept: row.Dept || row.dept || "N/A",
                        parent: row.Parent || row.parent || "N/A"
                    });
                });
                saveDb();
                alert(`Imported ${data.length} students successfully!`);
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            const area = document.getElementById('content-area');

            if(tab === 'overview') {
                area.innerHTML = `<h1 class="text-3xl font-bold mb-6">Overview</h1>
                <div class="bg-white p-6 rounded-2xl shadow-sm border w-64 text-center">
                    <p class="text-slate-400 font-bold uppercase text-xs">Total Students</p>
                    <p class="text-4xl font-black text-blue-600 mt-2">${studentDb.length}</p>
                </div>`;
            } 
            else if(tab === 'students') {
                area.innerHTML = `<div class="flex justify-between mb-6">
                    <h1 class="text-3xl font-bold">Students Directory</h1>
                </div>
                <div class="bg-white rounded-xl shadow-sm border overflow-x-auto">
                    <table class="w-full text-left" id="student-table">
                        <thead class="bg-slate-50 border-b">
                            <tr>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Student Name</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">ID</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Level/Dept</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase">Phones</th>
                                <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${studentDb.map((s, index) => `
                            <tr class="border-b hover:bg-slate-50">
                                <td class="p-4 font-bold text-slate-700">${s.name}</td>
                                <td class="p-4 font-medium text-slate-500">${s.id}</td>
                                <td class="p-4 text-sm text-slate-500">${s.level} - ${s.dept}</td>
                                <td class="p-4 text-xs text-slate-400">S: ${s.phone}<br>P: ${s.parent}</td>
                                <td class="p-4 text-center">
                                    <button onclick="deleteStudent(${index})" class="text-red-500 hover:bg-red-50 p-2 rounded-lg">
                                        <i class="fas fa-trash-alt"></i>
                                    </td>
                                </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
            }
            else if(tab === 'upload') {
                area.innerHTML = `<div class="max-w-xl mx-auto text-center mt-20">
                    <div class="bg-white p-10 rounded-3xl border-2 border-dashed border-slate-300">
                        <i class="fas fa-file-excel text-5xl text-green-500 mb-6"></i>
                        <h2 class="text-xl font-bold mb-2">Upload Student Spreadsheet</h2>
                        <p class="text-slate-400 mb-6 text-sm">Upload .xlsx file with Name, ID, Phone, Level, Dept, Parent columns.</p>
                        <input type="file" id="fileIn" class="hidden" accept=".xlsx" onchange="handleUpload(event)">
                        <button onclick="document.getElementById('fileIn').click()" class="bg-green-600 text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-green-200">Select File</button>
                    </div>
                </div>`;
            }
        }

        window.onload = () => switchTab('overview', document.querySelector('.sidebar-item'));
    </script>
</body>
</html>
