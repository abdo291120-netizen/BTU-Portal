<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTU - Admin Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4">

    <div id="auth-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-slate-800 p-10 rounded-[2rem] border border-slate-700 shadow-2xl w-full max-w-md text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20">
                <i class="fas fa-lock text-3xl"></i>
            </div>
            <h2 class="text-2xl font-black mb-2">دخول المسؤول</h2>
            <p class="text-slate-400 text-sm mb-8">يرجى إدخال كلمة المرور للإدارة</p>
            <input type="password" id="pass-input" placeholder="••••••••" class="w-full p-4 rounded-xl bg-slate-900 border border-slate-700 mb-4 outline-none focus:ring-2 focus:ring-blue-500 text-center text-xl tracking-widest">
            <button id="login-btn" class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition-all active:scale-95 shadow-xl">تحقق ودخول</button>
        </div>
    </div>

    <div id="admin-dashboard" class="hidden max-w-6xl mx-auto py-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-xl">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">BTU <span class="text-blue-500">ADMIN</span> CONTROL</h1>
                <p class="text-slate-400 text-xs mt-1 font-bold uppercase tracking-[0.2em]">Cloud Management System</p>
            </div>
            <div id="cloud-status" class="flex items-center gap-3 bg-red-500/10 text-red-500 border border-red-500/20 px-6 py-2 rounded-full text-xs font-black uppercase">
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span> Offline
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-slate-800 rounded-[2rem] border border-slate-700 p-8 sticky top-8 shadow-2xl">
                    <h3 class="font-black text-xl mb-6 flex items-center gap-3"><i class="fas fa-file-upload text-blue-500"></i> تحديث البيانات</h3>
                    <input type="file" id="excel-uploader" class="hidden" accept=".xlsx, .xls, .csv">
                    <div onclick="document.getElementById('excel-uploader').click()" class="cursor-pointer border-2 border-dashed border-slate-600 rounded-2xl p-10 hover:border-blue-500 transition-all bg-slate-900/50 text-center group">
                        <i class="fas fa-cloud-upload-alt text-5xl text-slate-500 group-hover:text-blue-500 mb-4 transition-colors"></i>
                        <p class="font-bold text-sm">اختر ملف الإكسيل</p>
                        <p class="text-slate-500 text-[10px] mt-2">سيتم رفع كافة الحقول (ID, Name, Dept, Year)</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-slate-800 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                    <div class="p-6 bg-slate-900/50 border-b border-slate-700 flex justify-between items-center">
                        <span class="font-black text-lg">الطلاب في السحابة</span>
                        <span id="counter" class="bg-blue-600 text-[10px] font-black px-4 py-1 rounded-full">0 طالب</span>
                    </div>
                    <div class="max-h-[600px] overflow-y-auto">
                        <table class="w-full text-right text-sm">
                            <thead class="sticky top-0 bg-slate-900 text-slate-500 text-[10px] font-black uppercase">
                                <tr>
                                    <th class="p-5">الاسم</th>
                                    <th class="p-5 text-center">الكود</th>
                                    <th class="p-5 text-center">الحالة</th>
                                </tr>
                            </thead>
                            <tbody id="preview-list" class="divide-y divide-slate-700/50"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // إعدادات Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY",
            authDomain: "btu-portal.firebaseapp.com",
            databaseURL: "https://btu-portal-default-rtdb.firebaseio.com",
            projectId: "btu-portal",
            storageBucket: "btu-portal.firebasestorage.app",
            messagingSenderId: "89595921223",
            appId: "1:89595921223:web:6f2039fb0dfeac1c08c262"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // وظيفة تسجيل الدخول
        document.getElementById('login-btn').onclick = () => {
            const pass = document.getElementById('pass-input').value;
            if (pass === "123456") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                syncData();
            } else { alert("كلمة المرور غير صحيحة"); }
        };

        // تحديث حالة الاتصال بالسحابة
        onValue(ref(db, '.info/connected'), (snap) => {
            const status = document.getElementById('cloud-status');
            if (snap.val()) {
                status.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Cloud Online`;
                status.className = "flex items-center gap-3 bg-green-500/10 text-green-500 border border-green-500/20 px-6 py-2 rounded-full text-xs font-black uppercase";
            }
        });

        // قراءة الإكسيل ورفع البيانات للسحابة
        document.getElementById('excel-uploader').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const rawList = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                const cloudMap = {};
                rawList.forEach(s => {
                    const studentId = String(s['University ID'] || '').trim();
                    if (studentId) {
                        cloudMap[studentId] = {
                            name: s['Name'] || 'غير مسجل',
                            id: studentId,
                            dept: s['Department'] || 'Marketing',
                            year: s['Year'] || 'N/A',
                            phone: s['Phone'] || 'N/A',
                            parentPhone: s['Parent Phone'] || 'N/A'
                        };
                    }
                });

                set(ref(db, 'students'), cloudMap)
                    .then(() => alert("تم تحديث كافة بيانات الطلاب في السحابة بنجاح!"))
                    .catch(() => alert("حدث خطأ أثناء الرفع"));
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        // مزامنة عرض جدول المعاينة من السحابة مباشرة
        function syncData() {
            onValue(ref(db, 'students'), (snap) => {
                const tbody = document.getElementById('preview-list');
                const counter = document.getElementById('counter');
                tbody.innerHTML = '';
                if (snap.exists()) {
                    const list = Object.values(snap.val());
                    counter.innerText = `${list.length} طالب`;
                    list.forEach(s => {
                        tbody.innerHTML += `
                            <tr class="hover:bg-slate-700/30 transition-colors">
                                <td class="p-5 font-bold text-blue-400 text-right">${s.name}</td>
                                <td class="p-5 text-center text-slate-400 font-mono">${s.id}</td>
                                <td class="p-5 text-center"><span class="bg-green-500/20 text-green-500 text-[9px] font-black px-2 py-1 rounded">SYNCED</span></td>
                            </tr>`;
                    });
                }
            });
        }
    </script>
</body>
</html>
