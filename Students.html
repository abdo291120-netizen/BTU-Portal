<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSUT - Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        #login-page {
            background: linear-gradient(rgba(30, 41, 59, 0.7), rgba(30, 41, 59, 0.7)), 
                        url('https://images.unsplash.com/photo-1562774053-701939374585?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { background: white; border-radius: 16px; width: 100%; max-width: 450px; padding: 40px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .hero-title { font-family: 'Merriweather', serif; color: white; font-size: 3.5rem; margin-bottom: 0.5rem; text-align: center; }
        .hero-subtitle { color: #bfdbfe; font-weight: 500; margin-bottom: 0.5rem; text-align: center; }
        .portal-tag { color: #3b82f6; font-weight: 700; letter-spacing: 0.1em; font-size: 0.8rem; margin-bottom: 2rem; }
        .sidebar-item { transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: #64748b; font-weight: 500; margin-bottom: 4px; }
        .sidebar-item:hover { background-color: #f1f5f9; color: #2563eb; }
        .sidebar-item.active { background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
    </style>
</head>
<body class="bg-slate-50">

    <div id="login-page">
        <h1 class="hero-title">Business Administration</h1>
        <p class="hero-subtitle text-xl">Beni Suef Technological University</p>
        <p class="portal-tag">ACADEMIC PORTAL</p>

        <div class="login-card">
            <h2 class="text-2xl font-bold text-center text-slate-800 mb-2">Student Sign In</h2>
            <p class="text-center text-slate-500 text-sm mb-8">Secure access to your academic records</p>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                    <input type="text" id="std-name" placeholder="Enter your full name" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">University ID Number</label>
                    <input type="text" id="std-id" placeholder="e.g. 20230001" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Department</label>
                    <select id="std-dept" class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white text-slate-400">
                        <option value="">Select your department</option>
                        <option value="Marketing">Marketing</option>
                    </select>
                </div>
                <button onclick="loginStudent()" class="w-full bg-[#111827] text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition-all mt-4">Sign In</button>
            </div>
        </div>
    </div>

    <div id="main-portal" class="hidden flex min-h-screen">
        <aside class="w-64 border-r border-slate-200 bg-white flex flex-col p-4 fixed h-full z-10">
            <div class="mb-8 px-2">
                <h1 class="text-xl font-bold text-slate-900 leading-tight">Business Administration</h1>
                <p class="text-xs text-slate-500 font-medium italic">Beni Suef Technological University</p>
            </div>
            <nav class="flex-1">
                <div onclick="switchTab('dashboard', this)" class="sidebar-item active"><i class="fas fa-th-large"></i> Dashboard</div>
                <div onclick="switchTab('personal', this)" class="sidebar-item"><i class="far fa-user"></i> Personal Information</div>
            </nav>
            <div class="mt-auto border-t border-slate-100 pt-4">
                <div onclick="logout()" class="sidebar-item text-red-500 hover:bg-red-50"><i class="fas fa-sign-out-alt"></i> Logout</div>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-10 bg-slate-50/50">
            <div id="dynamic-content" class="max-w-6xl mx-auto"></div>
        </main>
    </div>

    <script>
        let currentStudent = null;

        function loginStudent() {
            const name = document.getElementById('std-name').value.trim();
            const id = document.getElementById('std-id').value.trim();
            const dept = document.getElementById('std-dept').value;

            // جلب البيانات من صفحة الأدمن
            const db = JSON.parse(localStorage.getItem('BTU_PORTAL_DB')) || [];

            // البحث عن الطالب
            const student = db.find(s => 
                s.name.toLowerCase() === name.toLowerCase() && 
                s.id === id
            );

            if (student) {
                currentStudent = {
                    ...student,
                    initials: student.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2)
                };
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-portal').classList.remove('hidden');
                switchTab('dashboard', document.querySelector('.sidebar-item'));
            } else {
                alert("بيانات الدخول غير صحيحة. يرجى التأكد من الاسم والرقم الجامعي كما هو مسجل في الشيت.");
            }
        }

        function logout() {
            location.reload();
        }

        function switchTab(tab, element) {
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            const content = document.getElementById('dynamic-content');

            if (tab === 'dashboard') {
                content.innerHTML = `
                    <div class="mb-8"><h1 class="text-3xl font-bold text-slate-900">Dashboard</h1><p class="text-slate-500 mt-1 font-medium">Welcome back, ${currentStudent.name}</p></div>
                    <div class="grid grid-cols-4 gap-4 mb-8">
                        <div class="card"><p class="stat-label">Cumulative GPA</p><p class="text-4xl font-bold text-blue-600 mt-2">${currentStudent.gpa || '0.00'}</p></div>
                        <div class="card"><p class="stat-label">Department</p><p class="text-lg font-bold text-slate-800 mt-2">${currentStudent.dept}</p></div>
                    </div>`;
            } else if (tab === 'personal') {
                content.innerHTML = `
                    <div class="mb-8"><h1 class="text-3xl font-bold text-slate-900 italic">Personal Information</h1></div>
                    <div class="card bg-white p-8">
                        <div class="flex items-center gap-6 mb-8">
                            <div class="w-24 h-24 rounded-full bg-blue-600 text-white flex items-center justify-center text-3xl font-bold">${currentStudent.initials}</div>
                            <div>
                                <h2 class="text-2xl font-bold">${currentStudent.name}</h2>
                                <p class="text-slate-500">${currentStudent.id}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            <div><p class="text-xs font-bold text-slate-400 uppercase">Phone</p><p class="font-medium">${currentStudent.phone || 'N/A'}</p></div>
                            <div><p class="text-xs font-bold text-slate-400 uppercase">Parent Phone</p><p class="font-medium">${currentStudent.parent || 'N/A'}</p></div>
                            <div><p class="text-xs font-bold text-slate-400 uppercase">Level</p><p class="font-medium">${currentStudent.level || 'N/A'}</p></div>
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
