<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - BSUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .sidebar-item { transition: all 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: #64748b; font-weight: 500; margin-bottom: 4px; }
        .sidebar-item:hover { background-color: #f1f5f9; color: #2563eb; }
        .sidebar-item.active { background-color: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
        .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.025em; }
        #login-screen {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756defe93?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl text-slate-900">
            <h1 class="text-2xl font-black text-center mb-2 italic">BSUT <span class="text-blue-600">PORTAL</span></h1>
            <p class="text-center text-slate-500 font-bold mb-8 text-xs uppercase tracking-widest">Student Login</p>
            <div class="space-y-4">
                <input type="text" id="login-name" placeholder="Full Name (as in Excel)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all text-center font-medium">
                <input type="text" id="login-id" placeholder="University ID" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all text-center font-medium">
                <button id="btn-login" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 transition-all shadow-xl">Login System</button>
            </div>
            <p id="login-msg" class="text-red-500 text-xs mt-4 text-center font-bold"></p>
        </div>
    </div>

    <div id="portal-wrapper" class="hidden flex w-full">
        <aside class="w-64 border-r border-slate-200 bg-white flex flex-col p-4 fixed h-full z-10">
            <div class="mb-8 px-2">
                <h1 class="text-xl font-bold text-slate-900 leading-tight">Business Administration</h1>
                <p class="text-xs text-slate-500 font-medium italic">Beni Suef Technological University</p>
            </div>
            <nav id="sidebar-nav" class="flex-1">
                <div onclick="switchTab('dashboard', this)" class="sidebar-item active"><i class="fas fa-th-large"></i> Dashboard</div>
                <div onclick="switchTab('personal', this)" class="sidebar-item"><i class="far fa-user"></i> Personal Information</div>
                <div onclick="switchTab('academic', this)" class="sidebar-item"><i class="fas fa-graduation-cap"></i> Academic Record</div>
                <div onclick="switchTab('results', this)" class="sidebar-item"><i class="fas fa-award"></i> Results</div>
                <div onclick="switchTab('assignments', this)" class="sidebar-item"><i class="fas fa-book-open"></i> Assignments</div>
                <div onclick="switchTab('military', this)" class="sidebar-item"><i class="fas fa-shield-alt"></i> Military Education</div>
            </nav>
            <div class="mt-auto border-t border-slate-100 pt-4">
                <div onclick="location.reload()" class="sidebar-item text-red-500 hover:bg-red-50 hover:text-red-600 cursor-pointer">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </div>
            </div>
        </aside>

        <main class="flex-1 ml-64 p-10 bg-slate-50/50 min-h-screen">
            <div id="dynamic-content" class="max-w-6xl mx-auto"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY",
            authDomain: "btu-portal.firebaseapp.com",
            databaseURL: "https://btu-portal-default-rtdb.firebaseio.com",
            projectId: "btu-portal"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.studentData = {}; // ستملأ من السحابة

        document.getElementById('btn-login').onclick = async function() {
            const nameInput = document.getElementById('login-name').value.trim();
            const idInput = document.getElementById('login-id').value.trim();
            const msg = document.getElementById('login-msg');

            msg.innerText = "Checking records...";
            
            try {
                const snapshot = await get(child(ref(db), 'students'));
                if (snapshot.exists()) {
                    const student = Object.values(snapshot.val()).find(s => 
                        s.Name.toLowerCase() === nameInput.toLowerCase() && String(s['University ID']) === idInput
                    );

                    if (student) {
                        window.studentData = student;
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('portal-wrapper').classList.remove('hidden');
                        switchTab('dashboard', document.querySelector('.sidebar-item'));
                    } else {
                        msg.innerText = "Invalid credentials. Ensure Name and ID match the Excel file.";
                    }
                }
            } catch (e) { msg.innerText = "Connection error."; }
        };

        window.switchTab = function(tab, element) {
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            const content = document.getElementById('dynamic-content');
            const s = window.studentData;
            const initials = s.Name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2);

            if (tab === 'dashboard') {
                content.innerHTML = `
                    <div class="mb-8"><h1 class="text-3xl font-bold text-slate-900">Student Dashboard</h1><p class="text-slate-500 mt-1 font-medium">Welcome back, ${s.Name}</p></div>
                    <div class="grid grid-cols-4 gap-4 mb-8">
                        <div class="card"><p class="stat-label">Cumulative GPA</p><p class="text-4xl font-bold text-blue-600 mt-2">${s.GPA || '0.00'}</p></div>
                        <div class="card"><p class="stat-label">Department</p><p class="text-xl font-bold text-slate-800 mt-2">${s.Department}</p></div>
                        <div class="card"><p class="stat-label">Academic Year</p><p class="text-xl font-bold text-orange-500 mt-2">${s.Year}</p></div>
                        <div class="card"><p class="stat-label">Phone Status</p><p class="text-xl font-bold text-green-600 mt-2">Verified</p></div>
                    </div>`;
            } 
            else if (tab === 'personal') {
                content.innerHTML = `
                    <div class="mb-8"><h1 class="text-3xl font-bold text-slate-900 italic">Personal Information</h1></div>
                    <div class="card p-0 overflow-hidden mb-6 border-none shadow-sm">
                        <div class="h-32 bg-gradient-to-r from-blue-700 to-indigo-900"></div>
                        <div class="px-8 pb-6 flex justify-between items-end -mt-12 relative z-10">
                            <div class="flex items-center gap-6">
                                <div class="w-32 h-32 rounded-full bg-white border-4 border-white shadow-lg flex items-center justify-center text-blue-700 text-4xl font-bold">${initials}</div>
                                <div class="mb-2"><h2 class="text-3xl font-bold text-slate-800 italic">${s.Name}</h2><p class="text-slate-500 font-medium italic">${s.Department} · ${s.Year}</p></div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="card">
                            <h3 class="font-bold text-slate-800 mb-4 italic">Account Details</h3>
                            <div class="space-y-4 text-sm">
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">University ID</p><p class="font-bold">${s['University ID']}</p></div>
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Department</p><p class="font-bold">${s.Department}</p></div>
                            </div>
                        </div>
                        <div class="card">
                            <h3 class="font-bold text-slate-800 mb-4 italic">Contact Information</h3>
                            <div class="space-y-4 text-sm">
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Student Phone</p><p class="font-bold">${s.Phone || 'Not Available'}</p></div>
                                <div><p class="text-[10px] font-bold text-slate-400 uppercase">Parent Phone</p><p class="font-bold">${s['Parent Phone'] || 'Not Available'}</p></div>
                            </div>
                        </div>
                    </div>`;
            }
            else {
                content.innerHTML = `<div class="card py-20 text-center text-slate-400 italic">Data for ${tab} is currently being synced from the cloud.</div>`;
            }
        };
    </script>
</body>
</html>
