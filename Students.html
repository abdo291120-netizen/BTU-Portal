<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSUT Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .login-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756defe93?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-page" class="login-bg min-h-screen flex items-center justify-center p-6 text-white">
        <div class="w-full max-w-md bg-white rounded-3xl p-10 shadow-2xl text-slate-900">
            <h2 class="text-center text-3xl font-black mb-2 italic text-slate-900">BSUT <span class="text-blue-600">PORTAL</span></h2>
            <p class="text-center text-slate-500 mb-8 font-medium">سجل دخولك برقمك الجامعي</p>
            
            <div class="space-y-5">
                <input type="text" id="std-name" placeholder="الاسم بالكامل (كما في الكشف)" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-right">
                <input type="text" id="std-id" placeholder="رقم الكود (مثال: MK1000)" class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all text-right">
                
                <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-600 transition-all shadow-xl">
                    دخول النظام
                </button>
            </div>
            <p id="msg" class="text-red-500 text-sm mt-4 text-center font-bold"></p>
        </div>
    </div>

    <div id="main-portal" class="hidden min-h-screen flex text-white">
        <aside class="w-72 bg-slate-900 border-r border-slate-800 p-8">
            <h1 class="text-2xl font-black mb-10 text-blue-500 italic">BTU PORTAL</h1>
            <nav class="space-y-4">
                <div class="p-4 bg-blue-600 rounded-xl font-bold cursor-pointer"><i class="fas fa-home ml-3"></i> لوحة التحكم</div>
                <div onclick="location.reload()" class="p-4 text-slate-400 hover:text-red-400 cursor-pointer transition-all"><i class="fas fa-sign-out-alt ml-3"></i> خروج</div>
            </nav>
        </aside>

        <main class="flex-1 p-12 bg-slate-950">
            <h1 id="welcome" class="text-4xl font-black mb-8"></h1>
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                    <p class="text-slate-500 text-xs font-bold uppercase mb-2">القسم</p>
                    <h2 id="dept" class="text-2xl font-bold"></h2>
                </div>
                <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl border-b-4 border-b-blue-600">
                    <p class="text-slate-500 text-xs font-bold uppercase mb-2">السنة الدراسية</p>
                    <h2 id="year" class="text-2xl font-bold"></h2>
                </div>
                <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-xl">
                    <p class="text-slate-500 text-xs font-bold uppercase mb-2">رقم الكود</p>
                    <h2 id="code" class="text-2xl font-bold"></h2>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY",
            authDomain: "btu-portal.firebaseapp.com",
            databaseURL: "https://btu-portal-default-rtdb.firebaseio.com",
            projectId: "btu-portal",
            storageBucket: "btu-portal.firebasestorage.app",
            messagingSenderId: "89595921223",
            appId: "1:89595921223:web:6f2039fb0dfeac1c08c262"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.login = async function() {
            const name = document.getElementById('std-name').value.trim();
            const id = document.getElementById('std-id').value.trim();
            const msg = document.getElementById('msg');

            if(!name || !id) return;
            msg.innerText = "جاري التحقق...";

            try {
                const snap = await get(child(ref(db), 'students'));
                if(snap.exists()){
                    const student = Object.values(snap.val()).find(s => 
                        s.name.toLowerCase() === name.toLowerCase() && s.id === id
                    );

                    if(student){
                        document.getElementById('login-page').classList.add('hidden');
                        document.getElementById('main-portal').classList.remove('hidden');
                        document.getElementById('welcome').innerText = "أهلاً بك، " + student.name;
                        document.getElementById('dept').innerText = student.dept;
                        document.getElementById('year').innerText = student.year;
                        document.getElementById('code').innerText = student.id;
                    } else { msg.innerText = "الاسم أو الكود غير صحيح"; }
                }
            } catch(e) { msg.innerText = "خطأ في الاتصال بالسحابة"; }
        }
    </script>
</body>
</html>
