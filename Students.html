<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTU Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1541339907198-e08756defe93?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body class="text-white">

    <div id="login-screen" class="hero-bg min-h-screen flex items-center justify-center p-6">
        <div class="bg-white rounded-[2rem] p-10 w-full max-w-md shadow-2xl text-slate-900">
            <h1 class="text-3xl font-black italic text-center mb-2 tracking-tighter">BTU <span class="text-blue-600">PORTAL</span></h1>
            <p class="text-center text-slate-500 font-bold mb-8 text-sm uppercase">Academic Login</p>
            
            <div class="space-y-4">
                <input type="text" id="name" placeholder="الاسم بالكامل" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all text-center">
                <input type="text" id="id" placeholder="الرقم الجامعي (MK1000)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 transition-all text-center">
                <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-600 transition-all shadow-xl">دخول النظام</button>
            </div>
            <p id="err" class="text-red-500 text-xs mt-4 text-center font-bold"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen bg-slate-950 p-8">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-12">
                <h1 class="text-3xl font-black italic">BTU <span class="text-blue-500">STUDENT</span></h1>
                <button onclick="location.reload()" class="bg-slate-900 border border-slate-800 px-6 py-2 rounded-full text-slate-400 hover:text-white transition-all">خروج</button>
            </div>
            
            <div class="bg-slate-900 p-10 rounded-[3rem] border border-slate-800 mb-8">
                <h2 id="welcome" class="text-4xl font-black mb-10"></h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="p-6 bg-slate-950 rounded-3xl border border-slate-800"><p class="text-slate-500 text-xs font-bold uppercase mb-2">القسم</p><h3 id="d-dept" class="text-xl font-bold"></h3></div>
                    <div class="p-6 bg-slate-950 rounded-3xl border border-slate-800"><p class="text-slate-500 text-xs font-bold uppercase mb-2">رقم الكود</p><h3 id="d-code" class="text-xl font-bold"></h3></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBwg2LRk5wbTMuYNoqoP3Pd5zlOvgXBEIY",
            authDomain: "btu-portal.firebaseapp.com",
            databaseURL: "https://btu-portal-default-rtdb.firebaseio.com",
            projectId: "btu-portal",
            storageBucket: "btu-portal.firebasestorage.app",
            messagingSenderId: "89595921223",
            appId: "1:89595921223:web:6f2039fb0dfeac1c08c262"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.login = async function() {
            const name = document.getElementById('name').value.trim();
            const id = document.getElementById('id').value.trim();
            const err = document.getElementById('err');
            
            if(!name || !id) return;
            err.innerText = "جاري الاتصال بالسحابة...";

            try {
                const snap = await get(child(ref(db), 'students'));
                if(snap.exists()) {
                    const student = Object.values(snap.val()).find(s => 
                        s.name.toLowerCase() === name.toLowerCase() && s.id === id
                    );

                    if(student) {
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('dashboard').classList.remove('hidden');
                        document.getElementById('welcome').innerText = "أهلاً، " + student.name;
                        document.getElementById('d-dept').innerText = student.dept;
                        document.getElementById('d-code').innerText = student.id;
                    } else { err.innerText = "الاسم أو الكود غير موجود في السجلات السحابية"; }
                } else { err.innerText = "قاعدة البيانات فارغة تماماً"; }
            } catch(e) { err.innerText = "خطأ في الاتصال"; }
        }
    </script>
</body>
</html>
